<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a10;--surface:#0c1220;--surface2:#101828;
  --border:#1a2640;--border2:#223050;
  --blue:#3b82f6;--blue2:#93c5fd;--cyan:#22d3ee;
  --amber:#f59e0b;--amber2:#fcd34d;
  --green:#34d399;--red:#f87171;--yellow:#facc15;--purple:#a78bfa;
  --text:#e2e8f0;--muted:#4a6080;--muted2:#7a96b8;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{background-image:
  radial-gradient(ellipse 100% 50% at 50% -10%,rgba(59,130,246,.13) 0%,transparent 65%),
  radial-gradient(ellipse 60% 40% at 95% 95%,rgba(34,211,238,.07) 0%,transparent 60%)}

#app{display:flex;flex-direction:column;align-items:center;padding:28px 16px 60px;min-height:100vh}
.screen{width:100%;max-width:640px;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:36px 32px;position:relative;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.55);margin-bottom:16px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 5%,var(--blue) 35%,var(--cyan) 65%,transparent 95%);opacity:.75}

/* TYPOGRAPHY */
.hdr{text-align:center;margin-bottom:34px}
.hdr-icon{font-size:52px;line-height:1;margin-bottom:14px;filter:drop-shadow(0 0 22px rgba(59,130,246,.55))}
.hdr-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(100deg,var(--blue2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{color:var(--muted2);font-size:13px;margin-top:6px}
.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.pill{padding:4px 14px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.pb{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:var(--blue2)}
.pc{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.25);color:var(--cyan)}
.pa{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--amber2)}
.pg{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green)}

/* FORM ELEMENTS */
label.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:8px}
input[type=text],textarea,select{width:100%;background:rgba(255,255,255,.03);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(59,130,246,.12)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.field{margin-bottom:18px}

/* BUTTONS */
.btn{width:100%;border:none;border-radius:14px;padding:15px 24px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-p{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;box-shadow:0 6px 24px rgba(59,130,246,.35)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(59,130,246,.5)}
.btn-o{background:rgba(255,255,255,.04);border:1.5px solid var(--border2);color:var(--text)}
.btn-o:hover{background:rgba(255,255,255,.08);border-color:var(--blue);color:var(--blue2)}
.btn-c{background:linear-gradient(135deg,#0891b2,var(--cyan));color:#000;font-weight:700;box-shadow:0 6px 20px rgba(34,211,238,.25)}
.btn-c:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(34,211,238,.4)}
.btn-g{background:linear-gradient(135deg,#059669,var(--green));color:#000;font-weight:700;box-shadow:0 5px 18px rgba(52,211,153,.25)}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 9px 26px rgba(52,211,153,.4)}
.btn-a{background:linear-gradient(135deg,var(--amber),#d97706);color:#000;font-weight:700;box-shadow:0 5px 18px rgba(245,158,11,.25)}
.btn-a:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-sm{width:auto;padding:9px 20px;font-size:13px;border-radius:10px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}

.pname{font-size:13px;font-weight:600;color:var(--blue2)}
.prog{margin-bottom:26px}
.prog-track{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)}
.bdgs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.bdg{padding:3px 11px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.3px;font-family:'JetBrains Mono',monospace}
.bday{background:rgba(255,255,255,.05);color:var(--muted2)}
.bmcq{background:rgba(59,130,246,.15);color:var(--blue2)}
.btf{background:rgba(167,139,250,.15);color:var(--purple)}
.bsh{background:rgba(245,158,11,.15);color:var(--amber2)}
.bpts{background:rgba(52,211,153,.12);color:var(--green);margin-left:auto}
.q-text{font-size:18px;font-weight:500;line-height:1.65;color:#f0f6ff;margin-bottom:26px}

/* MCQ — changeable selection */
.opts{display:flex;flex-direction:column;gap:11px;margin-bottom:26px}
.opt{background:rgba(255,255,255,.03);border:1.5px solid var(--border2);border-radius:13px;padding:14px 18px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;transition:background .15s,border-color .15s;line-height:1.5;position:relative}
.opt:hover{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.3)}
.opt.chosen{background:rgba(59,130,246,.15);border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.opt-ltr{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;transition:all .15s}
.opt.chosen .opt-ltr{background:var(--blue);color:#fff}

/* T/F — changeable selection */
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px}
.tf-btn{background:rgba(255,255,255,.03);border:1.5px solid var(--border2);border-radius:16px;padding:24px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.tf-btn:hover{background:rgba(255,255,255,.07)}
.tf-btn.tf-chosen-t{background:rgba(52,211,153,.12);border-color:var(--green);color:#6ee7b7;box-shadow:0 0 0 3px rgba(52,211,153,.1)}
.tf-btn.tf-chosen-f{background:rgba(248,113,113,.12);border-color:var(--red);color:#fca5a5;box-shadow:0 0 0 3px rgba(248,113,113,.1)}
.tf-icon{font-size:32px}

/* Timer */
.timer-bar{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-bottom:6px}
.timer-fill{height:100%;border-radius:99px;transition:width 1s linear,background .5s}
.timer-chip{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05)}
.timer-chip.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:var(--amber2)}
.timer-chip.danger{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35);color:var(--red);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Short answer */
.short-wrap{margin-bottom:26px}
.short-wrap textarea{min-height:120px;resize:vertical;line-height:1.7}
.hint{font-size:12px;color:var(--muted2);margin-top:7px;line-height:1.55}

/* Grading */
.grade-ctr{text-align:center;padding:32px 16px}
.spin{width:52px;height:52px;border:3px solid rgba(59,130,246,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.bar-wrap{background:rgba(255,255,255,.04);border-radius:14px;padding:20px}
.bar-lbl{font-size:12px;color:var(--blue2);font-weight:600;margin-bottom:10px}
.bar-track{height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:99px;transition:width .5s ease}

/* My result */
.big-score{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:700;line-height:1;background:linear-gradient(90deg,var(--blue2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-of{color:var(--muted2);font-size:14px;margin-top:4px;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.stat-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;background:linear-gradient(90deg,var(--blue2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-l{font-size:11px;color:var(--muted2);margin-top:3px}

/* Export / code boxes */
.export-box{background:rgba(52,211,153,.06);border:1.5px solid rgba(52,211,153,.25);border-radius:16px;padding:20px;margin-bottom:16px}
.export-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:6px}
.export-desc{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:14px}
.export-desc b{color:var(--text)}
.code-box{background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.3);border-radius:16px;padding:20px;margin-bottom:16px}
.code-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--amber2);text-transform:uppercase;margin-bottom:10px}
.code-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber2);word-break:break-all;line-height:1.7;cursor:pointer;user-select:all;background:rgba(0,0,0,.2);border-radius:8px;padding:10px;border:1px solid rgba(245,158,11,.15)}
.code-hint{font-size:12px;color:var(--muted2);margin-top:8px}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:13px;padding:14px 16px;margin-bottom:10px}
.lb-rank{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;min-width:36px;text-align:center}
.rank-1{color:var(--amber2)}
.rank-2{color:var(--muted2)}
.rank-3{color:#cd7c54}
.rank-n{color:var(--muted)}
.lb-info{flex:1}
.lb-name{font-size:15px;font-weight:600;color:var(--text)}
.lb-sub{font-size:12px;color:var(--muted2);margin-top:2px}
.lb-score{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;background:linear-gradient(90deg,var(--blue2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:right}
.lb-pct{font-size:11px;color:var(--muted2);text-align:right;margin-top:2px}
.lb-empty{text-align:center;padding:32px 16px;color:var(--muted2);font-size:14px}

/* Results / compare */
.winner-area{text-align:center;margin-bottom:22px}
.w-emoji{font-size:44px;margin-bottom:8px}
.w-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--amber),#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tie-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--cyan)}
.vs-grid{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;margin-bottom:22px}
.vs-card{border-radius:16px;padding:18px;text-align:center;border:1.5px solid var(--border2)}
.vs-card.win{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(34,211,238,.1));border-color:var(--blue)}
.vs-n{font-weight:700;font-size:14px;margin-bottom:6px}
.vs-s{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;background:linear-gradient(90deg,var(--blue2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.vs-pct{font-size:12px;color:var(--muted2);margin-top:3px}
.vs-sep{text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--muted2);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.tab.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 14px rgba(59,130,246,.35)}

/* Review list */
.rev-list{display:flex;flex-direction:column;gap:10px;max-height:460px;overflow-y:auto;padding-right:4px}
.rev-list::-webkit-scrollbar{width:3px}
.rev-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ri{border-radius:13px;padding:15px;border:1px solid transparent}
.ri-c{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.2)}
.ri-p{background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.2)}
.ri-w{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.2)}
.ri-top{display:flex;justify-content:space-between;margin-bottom:5px;align-items:center}
.ri-meta{display:flex;gap:8px;font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace}
.ri-pts{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.pc2{color:var(--green)}.pp{color:var(--yellow)}.pw{color:var(--red)}
.ri-q{font-size:13px;color:var(--muted2);line-height:1.55;margin-bottom:5px}
.ri-a{font-size:12px;color:var(--muted2);margin-bottom:2px}.ri-a span{color:var(--text)}
.ri-fb{font-size:12px;color:var(--blue2);margin-top:5px;line-height:1.55;padding:7px 10px;background:rgba(59,130,246,.07);border-radius:7px;border-left:2px solid rgba(59,130,246,.4)}
.ri-correct{font-size:12px;color:var(--green);margin-top:4px}

/* Weak topic analysis */
.analysis-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}

/* Saved indicator */

}

<script>
/* =================== SUPABASE INIT =================== */
let db = null;
const dbReady = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
if (dbReady) {
  const { createClient } = supabase;
  db = createClient(SUPABASE_URL, SUPABASE_KEY);
}

/* =================== QUESTIONS =================== */
const QS = [
  // ── MCQ (16) — answers spread across A B C D ─────────────────────
  {id:1,type:'mcq',day:'Day 1',pts:1,
   q:"Which of the following best completes the ML formula?",
   opts:["Data + Rules → Output","Rules + Output → Data","Algorithm + Data → Model","Data + Model → Rules"],ans:2},
  {id:2,type:'mcq',day:'Day 2',pts:1,
   q:"Which statement about Deep Learning is FALSE?",
   opts:["It needs GPU/TPU to train","It learns features automatically","It works best on structured tabular data","Performance keeps improving with more data"],ans:2},
  {id:3,type:'mcq',day:'Day 2',pts:1,
   q:"What are the two components of an Expert System?",
   opts:["Data Pipeline + Model","Neural Network + Rules","Knowledge Base + Inference Engine","Algorithm + Dataset"],ans:2},
  {id:4,type:'mcq',day:'Day 3',pts:1,
   q:"Customer segmentation — grouping customers by behaviour — is an example of which ML type?",
   opts:["Supervised Learning","Semi-supervised Learning","Reinforcement Learning","Unsupervised Learning"],ans:3},
  {id:5,type:'mcq',day:'Day 3',pts:1,
   q:"Stock price prediction outputs a continuous number. Which ML task is this?",
   opts:["Classification","Clustering","Regression","Reinforcement Learning"],ans:2},
  {id:6,type:'mcq',day:'Day 4',pts:1,
   q:"In Batch Learning, when does the model learn from new data?",
   opts:["After every single new data point","Continuously in real time","Only after a full retrain from scratch on updated data","It never learns — it is a fixed rule system"],ans:2},
  {id:7,type:'mcq',day:'Day 5',pts:1,
   q:"A HIGH learning rate η in Online Learning causes:",
   opts:["Slow but very stable predictions","Fast adaptation but unstable, forgets old patterns quickly","The model to stop updating","Lower memory usage"],ans:1},
  {id:8,type:'mcq',day:'Day 5',pts:1,
   q:"Out-of-Core Learning is specifically designed for situations where:",
   opts:["The model has too many parameters","The dataset is too large to fit in RAM","Internet connectivity is unreliable","GPU is unavailable for training"],ans:1},
  {id:9,type:'mcq',day:'Day 6',pts:1,
   q:"KNN is called a lazy learner because:",
   opts:["It uses a very simple distance formula","It needs very few training examples","It does zero computation at training — all work happens at prediction time","It only works on small datasets"],ans:2},
  {id:10,type:'mcq',day:'Day 6',pts:1,
   q:"After training is complete, which learning type discards the original training data?",
   opts:["Instance-Based Learning","Reinforcement Learning","K-Nearest Neighbors (KNN)","Model-Based Learning"],ans:3},
  {id:11,type:'mcq',day:'Day 7',pts:1,
   q:"What is the root cause of Overfitting?",
   opts:["Model is too simple to capture patterns","Not enough training epochs","Too much regularization applied","Model is too complex and memorises noise instead of patterns"],ans:3},
  {id:12,type:'mcq',day:'Day 7',pts:1,
   q:"High Bias in an ML model indicates the model is:",
   opts:["Overfitting — performing great on training data","Too sensitive to small changes in training data","Underfitting — too simple to capture the underlying pattern","Performing equally well on train and test data"],ans:2},
  {id:13,type:'mcq',day:'Day 8',pts:1,

let S = {
  screen:'home', name:'', quizLabel:'', err:'',

function set(o){Object.assign(S,o);draw();}

/* =================== TIMER =================== */
function startTimer(minutes) {
  if (S.timerInterval) clearInterval(S.timerInterval);
  const secs = minutes * 60;
  S.timerDuration = secs;
  S.timerLeft = secs;
  S.timerInterval = setInterval(() => {
    S.timerLeft--;
    updateTimerUI();
    if (S.timerLeft <= 0) {
      clearInterval(S.timerInterval);
      S.timerInterval = null;
      // save current short answer if on one before force-submitting
      const q = QS[S.qi];
      if (q && q.type === 'short') {
        const ta = document.getElementById('sta');
        if (ta) S.answers[q.id] = ta.value.trim();
      }
      if (S.sel !== null && q && q.type !== 'short') {
        S.answers[q.id] = S.sel;
      }
      doGrade({...S.answers});
    }
  }, 1000);
}

function updateTimerUI() {
  const el = document.getElementById('timerChip');
  const bar = document.getElementById('timerBarFill');
  if (!el || !bar) return;
  const m = Math.floor(S.timerLeft / 60);
  const s = S.timerLeft % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = (S.timerLeft / S.timerDuration) * 100;
  bar.style.width = pct + '%';
  const color = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--amber)' : 'var(--red)';
  bar.style.background = color;
  el.className = 'timer-chip' + (pct <= 20 ? ' danger' : pct <= 50 ? ' warn' : '');
}

function stopTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
}

function startQuiz() {
  if (!S.name.trim()) {set({err:'Enter your name first!'}); return;}

  S.timerLeft = dur * 60;
  set({screen:'quiz', qi:0, sel:null, answers:{}, err:''});

}

async function gradeShort(question, expectedAns, studentAns) {
  const prompt = `You are grading a Machine Learning quiz for a BTech AI/ML student doing CampusX 100 Days of ML (Day 1-11).

GRADING PHILOSOPHY:
- Reward genuine conceptual understanding even if wording differs from expected answer
- Full marks for correct logic expressed differently, with good examples, or valid analogies
- Partial marks for: partially correct answers, right concept but missing some detail
- Zero ONLY for completely wrong answers or fundamental misconceptions
- Do NOT penalise for informal language or incomplete sentences if the core idea is correct

QUESTION: ${question}
EXPECTED KEY POINTS: ${expectedAns}
STUDENT ANSWER: ${studentAns}

Respond ONLY with raw JSON, no markdown, no backticks:
{"score": <0, 1, or 2>, "feedback": "<2-3 sentences: what they got right, what was missing, one key thing to remember. Be encouraging but honest.>"}`;

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:300,
        messages:[{role:"user", content:prompt}]
      })
    });
    const d = await r.json();
    const txt = (d.content && d.content[0] && d.content[0].text) || '';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  } catch(e) {
    return {score:1, feedback:"Partial credit awarded. AI grader unavailable — review manually."};
  }
}

/* =================== SUPABASE SAVE =================== */
async function saveToSupabase(result) {
  if (!dbReady || !db) return false;
  const mcqs = QS.filter(q => q.type==='mcq');
  const tfs  = QS.filter(q => q.type==='tf');
  const shs  = QS.filter(q => q.type==='short');
  const mcqS = mcqs.reduce((s,q) => s+(result.details[q.id]?.score||0),0);
  const tfS  = tfs.reduce((s,q) => s+(result.details[q.id]?.score||0),0);
  const shS  = shs.reduce((s,q) => s+(result.details[q.id]?.score||0),0);
  try {
    const { error } = await db.from('quiz_results').insert({
      player_name: result.name,
      score: result.score,
      max_score: MAX_PTS,
      percentage: Math.round(result.score / MAX_PTS * 100),
      mcq_score: mcqS,
      tf_score: tfS,
      short_score: shS,
      details: result.details,
      quiz_label: S.quizLabel || 'Quiz'
    });
    if (error) { console.error('Supabase insert error:', error); return false; }
    return true;
  } catch(e) {
    console.error('Supabase error:', e);
    return false;
  }
}

/* =================== LEADERBOARD =================== */
async function loadLeaderboard() {
  if (!dbReady || !db) return [];
  try {
    const { data, error } = await db
      .from('quiz_results')
      .select('player_name, score, max_score, percentage, mcq_score, tf_score, short_score, quiz_date, quiz_label')
      .order('score', {ascending:false})
      .order('quiz_date', {ascending:false})
      .limit(50);
    if (error) return [];
    return data || [];
  } catch(e) { return []; }
}


/* =================== NEXT / GRADE =================== */
function next() {
  const q = QS[S.qi];
  const ta = document.getElementById('sta');
  const ans = q.type==='short' ? (ta ? ta.value.trim() : '') : S.sel;
  if (ans === null && q.type !== 'short') return;
  const newA = {...S.answers, [q.id]: ans};
  if (S.qi < QS.length - 1) {
    set({answers:newA, qi:S.qi+1, sel:null});
  } else {
    stopTimer();
    set({answers:newA, sel:null});
    doGrade(newA);
  }
}

async function doGrade(finalA) {
  stopTimer();
  // No short answers in this quiz — instant grading
  let score = 0;
  const details = {};
  for (const q of QS) {
    const ok = finalA[q.id] === q.ans;
    details[q.id] = {score:ok?q.pts:0, given:finalA[q.id], correct:q.ans, feedback:null};
    if (ok) score += q.pts;
  }
  const myResult = {name:S.name.trim(), score, details, date:new Date().toLocaleString()};
  const saved = await saveToSupabase(myResult);
  set({myResult, screen:'myresult', savedToDb:saved});
}

/* =================== REPORT EXPORT =================== */
function buildReport(result, oppResult) {
  const bar  = '='.repeat(62);
  const thin = '-'.repeat(62);
  const lines = [];

  lines.push(bar);
  lines.push('  CAMPUSX ML QUIZ -- DAY 1 TO 11');
  lines.push('  AI-Graded Quiz Report');
  lines.push(bar);
  lines.push('  Player  : ' + result.name);
  lines.push('  Date    : ' + (result.date || new Date().toLocaleString()));
  lines.push('  Score   : ' + result.score + ' / ' + MAX_PTS + '  (' + Math.round(result.score/MAX_PTS*100) + '%)');
  if (oppResult) {
    lines.push('  Opponent: ' + oppResult.name + ' -- ' + oppResult.score + '/' + MAX_PTS);
    const winner = result.score > oppResult.score ? result.name
                 : oppResult.score > result.score ? oppResult.name : 'Tie';
    lines.push('  Winner  : ' + winner);
  }
  lines.push(bar);
  lines.push('');

  const mcqs = QS.filter(q=>q.type==='mcq');
  const tfs  = QS.filter(q=>q.type==='tf');
  const shs  = QS.filter(q=>q.type==='short');
  const mcqS = mcqs.reduce((s,q)=>s+(result.details[q.id]?.score||0),0);
  const tfS  = tfs.reduce((s,q)=>s+(result.details[q.id]?.score||0),0);
  const shS  = shs.reduce((s,q)=>s+(result.details[q.id]?.score||0),0);

  lines.push('  SCORE BREAKDOWN');
  lines.push(thin);
  lines.push('  MCQ           : ' + mcqS + ' / ' + mcqs.length);
  lines.push('  True / False  : ' + tfS  + ' / ' + tfs.length);
  // No short answers in this quiz
  lines.push('');

  const days = {};
  for (const q of QS) {
    if (!days[q.day]) days[q.day] = {got:0, total:0};
    days[q.day].got   += (result.details[q.id]?.score || 0);
    days[q.day].total += q.pts;
  }
  lines.push('  TOPIC ANALYSIS BY DAY');
  lines.push(thin);
  for (const [day, d] of Object.entries(days)) {
    const pct = Math.round(d.got / d.total * 100);
    const mark = pct >= 80 ? '[OK]  ' : pct >= 50 ? '[WEAK]' : '[MISS]';
    lines.push('  ' + mark + '  ' + day.padEnd(10) + '  ' + d.got + '/' + d.total + ' pts  (' + pct + '%)');
  }
  lines.push('');

  lines.push('  DETAILED QUESTION REVIEW');
  lines.push(thin);
  for (const q of QS) {
    const d = result.details[q.id];
    if (!d) continue;
    const pct2 = d.score / q.pts;
    const status = pct2 >= 1 ? '[CORRECT]' : pct2 > 0 ? '[PARTIAL]' : '[WRONG]  ';
    lines.push('');
    lines.push('  ' + status + ' Q' + q.id + ' -- ' + q.day + ' -- ' + q.type.toUpperCase() + ' -- ' + d.score + '/' + q.pts + ' pts');
    lines.push('  Question : ' + q.q);
    if (q.type === 'mcq') {
      lines.push('  Your ans : ' + (d.given !== null && d.given !== undefined ? q.opts[d.given] : '(no answer)'));
      if (pct2 < 1) lines.push('  Correct  : ' + q.opts[q.ans]);
    } else if (q.type === 'tf') {
      lines.push('  Your ans : ' + (d.given === true ? 'True' : d.given === false ? 'False' : '(no answer)'));
      if (pct2 < 1) lines.push('  Correct  : ' + (q.ans ? 'True' : 'False'));
    } else {
      lines.push('  Your ans : ' + (d.given || '(no answer)'));
      lines.push('  Expected : ' + q.ans);
      if (d.feedback) lines.push('  AI note  : ' + d.feedback);
    }
  }

  lines.push('');
  lines.push(bar);
  lines.push('');
  lines.push('  HOW TO USE THIS FILE WITH AN AI TOOL');
  lines.push(thin);
  lines.push('  Upload this file to Claude / ChatGPT and ask:');
  lines.push('');
  lines.push('  "Here is my ML quiz report. Please:');
  lines.push('   1. Identify my biggest knowledge gaps');
  lines.push('   2. Explain the topics I got wrong in simple terms');
  lines.push('   3. Give me 3 practice questions on my weak areas');
  lines.push('   4. Suggest what I should revise before next quiz"');
  lines.push('');
  lines.push(bar);
  return lines.join('\n');
}

function downloadReport(result, oppResult) {
  const text = buildReport(result, oppResult);
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ML_Quiz_Report_' + result.name.replace(/\s+/g,'_') + '_' + new Date().toLocaleDateString('en-GB').replace(/\//g,'-') + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  toast('Report downloaded!');
}

function decodeResult(code) {
  try { return JSON.parse(decodeURIComponent(escape(atob(code.trim())))); }
  catch(e) { return null; }
}
function copyCode() {
  const code = encodeResult(S.myResult);

  const r = S.myResult;
  const pct = Math.round((r.score / MAX_PTS) * 100);
  const msg = pct>=85 ? '&#128293; Outstanding!' : pct>=65 ? '&#128170; Solid!' : pct>=45 ? '&#128218; Keep going!' : '&#129488; Revise the notes';
  const mcqs = QS.filter(q=>q.type==='mcq');
  const tfs  = QS.filter(q=>q.type==='tf');
  const shs  = [];
  const mcqS = mcqs.reduce((s,q)=>s+(r.details[q.id]?.score||0),0);
  const tfS  = tfs.reduce((s,q)=>s+(r.details[q.id]?.score||0),0);
  const shS  = 0;
  const code = encodeResult(r);

  return `<div class="screen"><div class="card">
  <div style="text-align:center;margin-bottom:22px">
    <div style="font-size:13px;color:var(--muted2);margin-bottom:4px">Your Score</div>
    <div class="big-score">${r.score}</div>
    <div class="score-of">out of ${MAX_PTS} &nbsp;&middot;&nbsp; ${pct}% &nbsp;&middot;&nbsp; ${msg}</div>
    ${S.savedToDb ? '<div class="saved-badge">&#10003; Saved to leaderboard</div>' : ''}
  </div>
  <div class="stat-grid" style="grid-template-columns:1fr 1fr">
    <div class="stat-box"><div class="stat-n">${mcqS}/${mcqs.length}</div><div class="stat-l">MCQ</div></div>
    <div class="stat-box"><div class="stat-n">${tfS}/${tfs.length}</div><div class="stat-l">True/False</div></div>
  </div>

  <div class="export-box">
    <div class="export-lbl">&#128196; Quiz Report</div>
    <div class="export-desc">Download a <b>.txt report</b> with your full breakdown. Upload it to <b>Claude or ChatGPT</b> for personalised revision feedback on your weak topics.</div>
    <button class="btn btn-g btn-sm" id="dlBtn">&#8595; Download My Report</button>
  </div>

  <div class="code-box">
    <div class="code-lbl">&#128228; Share with Friend</div>
    <div class="code-val" id="codeVal">${code}</div>
    <div class="code-hint">Tap to select all &middot; Copy and send on WhatsApp</div>
    <div style="margin-top:12px"><button class="btn btn-o btn-sm" id="copyBtn">&#128203; Copy Result Code</button></div>
  </div>

  <div class="field"><label class="lbl">Paste Friend's Result Code</label>
    <textarea id="cmpInput" rows="3" placeholder="Paste your friend's code here..." style="min-height:80px;resize:none"></textarea>
    ${S.err ? `<div class="err" style="margin-top:10px;margin-bottom:0">${S.err}</div>` : ''}
  </div>
  <div class="btn-row">
    <button class="btn btn-p" id="cmpBtn">&#127942; Compare Scores</button>
    <button class="btn btn-o" id="skipBtn">&#128203; Review My Answers</button>
  </div>
</div></div>`;
}

/* RESULTS */
function rResults() {
  const me = S.myResult, opp = S.oppResult;
  const showOpp = !!opp;
  let winnerArea = '';
  if (showOpp) {
    const iWin = me.score > opp.score, tie = me.score === opp.score;
    winnerArea = tie
      ? `<div class="winner-area"><div class="w-emoji">&#129309;</div><div class="tie-title">It's a Tie!</div></div>`
      : `<div class="winner-area"><div class="w-emoji">&#127942;</div><div class="w-title">${esc(iWin?me.name:opp.name)} Wins!</div></div>`;
  }
  const tabs = [
    {id:'mine', l:'My Review'},
    ...(showOpp ? [{id:'opp', l: esc(opp.name)}] : []),
    {id:'key', l:'Answer Key'}
  ];
  const whose = S.tab==='opp' && showOpp ? opp : S.tab==='key' ? null : me;
  let listHTML = '';
  if (!whose) {
    listHTML = QS.map(q => {
      const ca = q.type==='tf' ? (q.ans?'True':'False') : q.type==='mcq' ? q.opts[q.ans] : q.ans;
      return `<div class="ri ri-c">
        <div class="ri-top"><div class="ri-meta"><span>${q.day}</span><span>${{mcq:'MCQ',tf:'T/F',short:'Short'}[q.type]}</span></div><div style="font-size:11px;color:var(--muted)">${q.pts}pt</div></div>
        <div class="ri-q">${esc(q.q)}</div>
        <div class="ri-correct">&#10003; ${esc(String(ca))}</div>
      </div>`;
    }).join('');
  } else {
    listHTML = QS.map(q => {
      const d = whose.details[q.id];
      if (!d) return '';
      const p = d.score / q.pts;
      const cls = p>=1?'ri-c':p>0?'ri-p':'ri-w';
      const ptsCls = p>=1?'pc2':p>0?'pp':'pw';
      let gStr = '&#8212;';
      if (q.type==='tf') gStr = d.given===true?'True':d.given===false?'False':'&#8212;';
      else if (q.type==='mcq') gStr = (d.given!==null&&d.given!==undefined) ? esc(q.opts[d.given]) : '&#8212;';
      else gStr = esc(d.given||'&#8212;');
      let corr = '';
      if (p < 1) {
        const ca = q.type==='tf'?(q.ans?'True':'False'):q.type==='mcq'?q.opts[q.ans]:null;
        if (ca) corr = `<div class="ri-correct">&#10003; Correct: ${esc(String(ca))}</div>`;
      }
      return `<div class="ri ${cls}">
        <div class="ri-top"><div class="ri-meta"><span>${q.day}</span><span>${{mcq:'MCQ',tf:'T/F',short:'Short'}[q.type]}</span></div><div class="ri-pts ${ptsCls}">${d.score}/${q.pts}</div></div>
        <div class="ri-q">${esc(q.q)}</div>
        <div class="ri-a">Answer: <span>${gStr}</span></div>
        ${corr}
        ${q.type==='short'&&d.feedback ? `<div class="ri-fb">&#128172; ${esc(d.feedback)}</div>` : ''}
      </div>`;
    }).join('');
  }

  return `<div class="screen"><div class="card">
  ${showOpp ? `${winnerArea}<div class="vs-grid">
    <div class="vs-card ${me.score>=opp.score?'win':''}">
      <div class="vs-n">${esc(me.name)}</div><div class="vs-s">${me.score}</div>
      <div class="vs-pct">${Math.round(me.score/MAX_PTS*100)}%</div>
    </div>
    <div class="vs-sep">VS</div>
    <div class="vs-card ${opp.score>=me.score?'win':''}">
      <div class="vs-n">${esc(opp.name)}</div><div class="vs-s">${opp.score}</div>
      <div class="vs-pct">${Math.round(opp.score/MAX_PTS*100)}%</div>
    </div>
  </div>` : `<div style="text-align:center;margin-bottom:20px">
    <div class="big-score" style="font-size:52px">${me.score}</div>
    <div style="color:var(--muted2);font-size:13px">out of ${MAX_PTS}</div>
  </div>`}
  <div class="export-box" style="margin-bottom:18px">
    <div class="export-lbl">&#128196; Reports</div>
    <div class="export-desc" style="margin-bottom:10px">Download .txt report &rarr; upload to Claude for revision feedback.</div>
    <div class="btn-row">
      <button class="btn btn-g btn-sm" id="dlMineBtn">&#8595; My Report</button>
      ${showOpp ? `<button class="btn btn-a btn-sm" id="dlOppBtn">&#8595; ${esc(opp.name)}'s Report</button>` : ''}
      ${dbReady ? `<button class="btn btn-o btn-sm" id="lbBtn2">&#127942; Leaderboard</button>` : ''}
    </div>
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="tab${S.tab===t.id?' on':''}" data-tab="${t.id}">${t.l}</button>`).join('')}</div>
  <div class="rev-list">${listHTML}</div>
  <button class="btn btn-o" id="resetBtn" style="margin-top:18px">&#128260; Play Again</button>
</div></div>`;
}

/* LEADERBOARD */
function rLeaderboard() {
  const rows = S.leaderboard;
  const byPlayer = {};
  for (const row of rows) {
    if (!byPlayer[row.player_name]) {
      byPlayer[row.player_name] = {name:row.player_name, best:row.score, count:0, total:0, pct:row.percentage};
    }
    byPlayer[row.player_name].count++;
    byPlayer[row.player_name].total += row.score;
    if (row.score > byPlayer[row.player_name].best) {
      byPlayer[row.player_name].best = row.score;
      byPlayer[row.player_name].pct = row.percentage;
    }
  }
  const players = Object.values(byPlayer).sort((a,b) => b.best - a.best);

  const rankEmoji = ['&#127947;','&#129352;','&#129353;'];
  const rankCls = ['rank-1','rank-2','rank-3'];

  let lbHTML = '';
  if (S.lbLoading) {
    lbHTML = `<div class="lb-empty"><div class="spin" style="margin:0 auto 12px"></div>Loading...</div>`;
  } else if (!players.length) {
    lbHTML = `<div class="lb-empty">No scores yet. Take the quiz first! &#128640;</div>`;
  } else {
    lbHTML = players.map((p,i) => {
      const avg = Math.round(p.total / p.count);
      return `<div class="lb-row">
        <div class="lb-rank ${i<3?rankCls[i]:'rank-n'}">${i<3?rankEmoji[i]:i+1}</div>
        <div class="lb-info">
          <div class="lb-name">${esc(p.name)}</div>
          <div class="lb-sub">${p.count} quiz${p.count>1?'zes':''} &middot; avg ${avg}/${MAX_PTS}</div>
        </div>
        <div>
          <div class="lb-score">${p.best}</div>
          <div class="lb-pct">${p.pct}% best</div>
        </div>
      </div>`;
    }).join('');
  }

  // Day-wise weakness across all attempts
  const dayTotals = {};
  for (const row of rows) {
    if (!row.details) continue;
    for (const q of QS) {
      if (!dayTotals[q.day]) dayTotals[q.day] = {got:0, total:0};
      dayTotals[q.day].got += (row.details[q.id]?.score || 0);
      dayTotals[q.day].total += q.pts;
    }
  }
  let anaHTML = '';
  if (Object.keys(dayTotals).length) {
    anaHTML = `
    <div style="margin-top:22px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:14px">Group Weak Spots (all attempts)</div>
      <div class="analysis-grid">
        ${Object.entries(dayTotals).map(([day,d])=>{
          const pct2 = d.total > 0 ? Math.round(d.got/d.total*100) : 0;
          const clr = pct2>=80?'var(--green)':pct2>=50?'var(--amber2)':'var(--red)';
          return `<div class="ana-row">
            <div class="ana-day">${day}</div>
            <div class="ana-bar-track"><div class="ana-bar-fill" style="width:${pct2}%;background:${clr}"></div></div>
            <div class="ana-pct" style="color:${clr}">${pct2}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return `<div class="screen"><div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">Leaderboard</div>
      <div style="color:var(--muted2);font-size:13px;margin-top:2px">All-time top scores</div>
    </div>
    <button class="btn btn-o btn-sm" id="refreshBtn">&#8635; Refresh</button>
  </div>
  ${lbHTML}
  ${anaHTML}
  <button class="btn btn-o" id="backBtn" style="margin-top:20px">&#8592; Back</button>
</div></div>`;
}

/* =================== EVENT BINDING =================== */
function bind() {
  const $ = id => document.getElementById(id);
  switch(S.screen) {
    case 'home':
      $('nameIn')?.addEventListener('input', e => { S.name = e.target.value; S.err=''; });
      $('labelIn')?.addEventListener('input', e => { S.quizLabel = e.target.value; });
      $('startBtn')?.addEventListener('click', startQuiz);
      $('lbBtn')?.addEventListener('click', async () => {
        set({screen:'leaderboard', lbLoading:true, leaderboard:[]});
        const data = await loadLeaderboard();
        set({leaderboard:data, lbLoading:false});
      });
      break;
    case 'quiz': {
      const q = QS[S.qi];
      if (q.type === 'mcq') {
        document.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => pickOpt(parseInt(b.dataset.i))));
      }
      if (q.type === 'tf') {
        $('tfT')?.addEventListener('click', () => pickTF(true));
        $('tfF')?.addEventListener('click', () => pickTF(false));
      }
      $('nextBtn')?.addEventListener('click', next);
      break;
    }
    case 'myresult':
      $('dlBtn')?.addEventListener('click', () => downloadReport(S.myResult, null));
      $('copyBtn')?.addEventListener('click', copyCode);
      $('codeVal')?.addEventListener('click', () => { const sel=window.getSelection(); sel.selectAllChildren($('codeVal')); });
      $('cmpBtn')?.addEventListener('click', compare);
      $('skipBtn')?.addEventListener('click', () => set({screen:'results', tab:'mine'}));
      $('cmpInput')?.addEventListener('input', e => { S.compareCode=e.target.value; S.err=''; });
      break;
    case 'results':
      document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => set({tab:b.dataset.tab})));
      $('dlMineBtn')?.addEventListener('click', () => downloadReport(S.myResult, S.oppResult));
      $('dlOppBtn')?.addEventListener('click', () => S.oppResult && downloadReport(S.oppResult, S.myResult));
      $('lbBtn2')?.addEventListener('click', async () => {
        set({screen:'leaderboard', lbLoading:true, leaderboard:[]});
        const data = await loadLeaderboard();
        set({leaderboard:data, lbLoading:false});
      });
      $('resetBtn')?.addEventListener('click', reset);
      break;
    case 'leaderboard':
      $('refreshBtn')?.addEventListener('click', async () => {
        set({lbLoading:true, leaderboard:[]});
        const data = await loadLeaderboard();
        set({leaderboard:data, lbLoading:false});
      });
      $('backBtn')?.addEventListener('click', () => set({screen: S.myResult ? 'results' : 'home'}));
      break;
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

draw();
</script>
