/* =================== TIMER =================== */
function startTimer(minutes) {
  if (S.timerInterval) clearInterval(S.timerInterval);
  const secs = minutes * 60;
  S.timerDuration = secs;
  S.timerLeft = secs;
  S.timerInterval = setInterval(() => {
    S.timerLeft--;
    updateTimerUI();
    if (S.timerLeft <= 0) {
      clearInterval(S.timerInterval);
      S.timerInterval = null;
      if (S.sel !== null) {
        const q = QS[S.qi];
        if (q) S.answers[q.id] = S.sel;
      }
      doGrade({...S.answers});
    }
  }, 1000);
}
function updateTimerUI() {
  const el = document.getElementById('timerChip');
  const bar = document.getElementById('timerBarFill');
  if (!el || !bar) return;
  const m = Math.floor(S.timerLeft / 60);
  const s = S.timerLeft % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = (S.timerLeft / S.timerDuration) * 100;
  const color = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--amber)' : 'var(--red)';
  bar.style.width = pct + '%';
  bar.style.background = color;
  el.className = 'timer-chip' + (pct <= 20 ? ' danger' : pct <= 50 ? ' warn' : '');
}
function stopTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
}

/* =================== QUIZ LOGIC =================== */
function startQuiz() {
  const nameEl = document.getElementById('nameIn');
  S.name = nameEl ? nameEl.value : S.name;
  if (!S.name.trim()) { set({err:'Select your name first!'}); return; }
  const dur = parseInt(document.getElementById('timerSel')?.value || '0');
  S.timerDuration = dur * 60;
  S.timerLeft = dur * 60;
  set({screen:'quiz', qi:0, sel:null, answers:{}, err:''});
  if (dur > 0) startTimer(dur);
}
function pickOpt(i) { set({sel:i}); }
function pickTF(v)  { set({sel:v}); }

/* =================== SUPABASE =================== */
async function saveToSupabase(result) {
  if (!dbReady || !db) return false;
  const mcqs = QS.filter(q => q.type==='mcq');
  const tfs  = QS.filter(q => q.type==='tf');
  const mcqS = mcqs.reduce((s,q) => s+(result.details[q.id]?.score||0), 0);
  const tfS  = tfs.reduce((s,q) => s+(result.details[q.id]?.score||0), 0);
  try {
    const { error } = await db.from('quiz_results').insert({
      player_name: result.name,
      score: result.score,
      max_score: MAX_PTS,
      percentage: Math.round(result.score / MAX_PTS * 100),
      mcq_score: mcqS,
      tf_score: tfS,
      short_score: 0,
      details: result.details,
      quiz_label: S.quizLabel || 'Day 13–20'
    });
    if (error) { console.error('Supabase error:', error); return false; }
    return true;
  } catch(e) { console.error('Supabase error:', e); return false; }
}
async function loadLeaderboard() {
  if (!dbReady || !db) return [];
  try {
    const { data, error } = await db
      .from('quiz_results')
      .select('player_name, score, max_score, percentage, mcq_score, tf_score, short_score, quiz_date, quiz_label')
      .order('score', {ascending:false})
      .order('quiz_date', {ascending:false})
      .limit(50);
    if (error) return [];
    return data || [];
  } catch(e) { return []; }
}

/* =================== NEXT / GRADE =================== */
function next() {
  const q = QS[S.qi];
  if (S.sel === null) return;
  const newA = {...S.answers, [q.id]: S.sel};
  if (S.qi < QS.length - 1) {
    set({answers:newA, qi:S.qi+1, sel:null});
  } else {
    stopTimer();
    set({answers:newA, sel:null});
    doGrade(newA);
  }
}
async function doGrade(finalA) {
  stopTimer();
  let score = 0;
  const details = {};
  for (const q of QS) {
    const ok = finalA[q.id] === q.ans;
    details[q.id] = {score:ok?q.pts:0, given:finalA[q.id], correct:q.ans};
    if (ok) score += q.pts;
  }
  const myResult = {name:S.name.trim(), score, details, date:new Date().toLocaleString()};
  const saved = await saveToSupabase(myResult);
  set({myResult, screen:'myresult', savedToDb:saved});
}

/* =================== REPORT =================== */
function buildReport(result, oppResult) {
  const bar = '='.repeat(62), thin = '-'.repeat(62);
  const lines = [];
  lines.push(bar);
  lines.push('  CAMPUSX ML QUIZ -- DAY 13 TO 20');
  lines.push('  Quiz Report');
  lines.push(bar);
  lines.push('  Player  : ' + result.name);
  lines.push('  Date    : ' + (result.date || new Date().toLocaleString()));
  lines.push('  Score   : ' + result.score + ' / ' + MAX_PTS + '  (' + Math.round(result.score/MAX_PTS*100) + '%)');
  if (oppResult) {
    lines.push('  Opponent: ' + oppResult.name + ' -- ' + oppResult.score + '/' + MAX_PTS);
    const winner = result.score > oppResult.score ? result.name
                 : oppResult.score > result.score ? oppResult.name : 'Tie';
    lines.push('  Winner  : ' + winner);
  }
  lines.push(bar); lines.push('');
  const mcqs = QS.filter(q=>q.type==='mcq');
  const tfs  = QS.filter(q=>q.type==='tf');
  lines.push('  SCORE BREAKDOWN');
  lines.push(thin);
  lines.push('  MCQ         : ' + mcqs.reduce((s,q)=>s+(result.details[q.id]?.score||0),0) + ' / ' + mcqs.length);
  lines.push('  True/False  : ' + tfs.reduce((s,q)=>s+(result.details[q.id]?.score||0),0)  + ' / ' + tfs.length);
  lines.push('');
  const days = {};
  for (const q of QS) {
    if (!days[q.day]) days[q.day] = {got:0, total:0};
    days[q.day].got   += (result.details[q.id]?.score || 0);
    days[q.day].total += q.pts;
  }
  lines.push('  TOPIC ANALYSIS BY DAY');
  lines.push(thin);
  for (const [day, d] of Object.entries(days)) {
    const pct = d.total > 0 ? Math.round(d.got/d.total*100) : 0;
    const mark = pct>=80?'[OK]  ':pct>=50?'[WEAK]':'[MISS]';
    lines.push('  '+mark+'  '+day.padEnd(10)+'  '+d.got+'/'+d.total+' pts  ('+pct+'%)');
  }
  lines.push('');
  lines.push('  DETAILED QUESTION REVIEW');
  lines.push(thin);
  for (const q of QS) {
    const d = result.details[q.id]; if (!d) continue;
    const ok = d.score >= q.pts;
    lines.push('');
    lines.push('  '+(ok?'[CORRECT]':'[WRONG]  ')+' Q'+q.id+' -- '+q.day+' -- '+q.type.toUpperCase()+' -- '+d.score+'/'+q.pts+' pt');
    lines.push('  Question : ' + q.q);
    if (q.type==='mcq') {
      lines.push('  Your ans : '+(d.given!==null&&d.given!==undefined?q.opts[d.given]:'(no answer)'));
      if (!ok) lines.push('  Correct  : '+q.opts[q.ans]);
    } else {
      lines.push('  Your ans : '+(d.given===true?'True':d.given===false?'False':'(no answer)'));
      if (!ok) lines.push('  Correct  : '+(q.ans?'True':'False'));
    }
  }
  lines.push(''); lines.push(bar); lines.push('');
  lines.push('  HOW TO USE THIS FILE WITH AN AI TOOL');
  lines.push(thin);
  lines.push('  Upload this file to Claude / ChatGPT and ask:');
  lines.push('  "Here is my ML quiz report. Identify my gaps,');
  lines.push('   explain what I got wrong, and give me 3 practice');
  lines.push('   questions on my weak areas."');
  lines.push(''); lines.push(bar);
  return lines.join('\n');
}
function downloadReport(result, oppResult) {
  const blob = new Blob([buildReport(result, oppResult)], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ML_Quiz_Day13_20_'+result.name.replace(/\s+/g,'_')+'_'+new Date().toLocaleDateString('en-GB').replace(/\//g,'-')+'.txt';
  a.click(); URL.revokeObjectURL(url); toast('Report downloaded!');
}

/* =================== TWO PLAYER =================== */
function encodeResult(r) { return btoa(unescape(encodeURIComponent(JSON.stringify(r)))); }
function decodeResult(code) {
  try { return JSON.parse(decodeURIComponent(escape(atob(code.trim())))); }
  catch(e) { return null; }
}
function copyCode() {
  navigator.clipboard.writeText(encodeResult(S.myResult)).catch(()=>{});
  toast('Result code copied!');
}
function compare() {
  const raw = (document.getElementById('cmpInput')||{value:''}).value.trim();
  if (!raw) { set({err:"Paste your friend's result code!"}); return; }
  const opp = decodeResult(raw);
  if (!opp || opp.score === undefined) { set({err:'Invalid code — ask your friend to copy it again.'}); return; }
  set({oppResult:opp, screen:'results', err:'', tab:'mine'});
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
function reset() {
  stopTimer();
  Object.assign(S,{screen:'home',name:'',quizLabel:'',err:'',qi:0,sel:null,answers:{},myResult:null,oppResult:null,tab:'mine',compareCode:'',leaderboard:[],lbLoading:false,savedToDb:false,timerDuration:0,timerLeft:0,timerInterval:null});
  draw();
}

  <div class="tabs">${tabs.map(t=>`<button class="tab${S.tab===t.id?' on':''}" data-tab="${t.id}">${t.l}</button>`).join('')}</div>
  <div class="rev-list">${listHTML}</div>
  <button class="btn btn-o" id="resetBtn" style="margin-top:18px">&#128260; Play Again</button>
</div></div>`;
}

/* LEADERBOARD */
function rLeaderboard() {
  const rows = S.leaderboard;
  const byPlayer = {};
  for (const row of rows) {
    const name = row.player_name;
    if (!byPlayer[name]) byPlayer[name] = {name,quizzes:[],totalPct:0,bestPct:0,totalScored:0,totalPossible:0};
    const pct = row.percentage || Math.round((row.score/row.max_score)*100);
    byPlayer[name].quizzes.push({label:row.quiz_label||'Quiz',score:row.score,max:row.max_score,pct,date:row.quiz_date});
    byPlayer[name].totalPct += pct;
    byPlayer[name].totalScored += row.score;
    byPlayer[name].totalPossible += row.max_score;
    if (pct > byPlayer[name].bestPct) byPlayer[name].bestPct = pct;
  }
  const players = Object.values(byPlayer).map(p=>({...p,avgPct:Math.round(p.totalPct/p.quizzes.length)})).sort((a,b)=>b.avgPct-a.avgPct);
  const rankEmoji=['&#127947;','&#129352;','&#129353;'], rankCls=['rank-1','rank-2','rank-3'];

  let lbHTML = '';
  if (S.lbLoading) {
    lbHTML = `<div class="lb-empty"><div class="spin" style="margin:0 auto 12px"></div>Loading...</div>`;
  } else if (!players.length) {
    lbHTML = `<div class="lb-empty">No scores yet — take a quiz first! &#128640;</div>`;
  } else {
    lbHTML = players.map((p,i) => {
      const sorted = [...p.quizzes].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const quizRows = sorted.map(q => {
        const clr = q.pct>=80?'var(--green)':q.pct>=60?'var(--amber2)':'var(--red)';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">
          <span style="font-size:11px;color:var(--muted2);flex:1">${esc(q.label||'Quiz')}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);margin:0 10px">${q.score}/${q.max}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${clr};min-width:38px;text-align:right">${q.pct}%</span>
        </div>`;
      }).join('');
      return `<div class="lb-row" style="flex-direction:column;align-items:stretch;gap:10px">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="lb-rank ${i<3?rankCls[i]:'rank-n'}">${i<3?rankEmoji[i]:i+1}</div>
          <div class="lb-info">
            <div class="lb-name">${esc(p.name)}</div>
            <div class="lb-sub">${p.quizzes.length} quiz${p.quizzes.length>1?'zes':''} &middot; best ${p.bestPct}% &middot; total ${p.totalScored}/${p.totalPossible} pts</div>
          </div>
          <div style="text-align:right"><div class="lb-score">${p.avgPct}%</div><div class="lb-pct">avg %</div></div>
        </div>
        <div style="padding:0 4px">${quizRows}</div>
      </div>`;
    }).join('');
  }

  const dayTotals = {};
  for (const row of rows) {
    if (!row.details) continue;
    for (const q of QS) {
      if (!dayTotals[q.day]) dayTotals[q.day] = {got:0,total:0};
      dayTotals[q.day].got   += (row.details[q.id]?.score || 0);
      dayTotals[q.day].total += q.pts;
    }
  }
  let anaHTML = '';
  if (Object.keys(dayTotals).length) {
    anaHTML = `<div style="margin-top:22px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:14px">Group Weak Spots</div>
      <div class="analysis-grid">
        ${Object.entries(dayTotals).map(([day,d])=>{
          const pct2=d.total>0?Math.round(d.got/d.total*100):0;
          const clr=pct2>=80?'var(--green)':pct2>=50?'var(--amber2)':'var(--red)';
          return `<div class="ana-row"><div class="ana-day">${day}</div><div class="ana-bar-track"><div class="ana-bar-fill" style="width:${pct2}%;background:${clr}"></div></div><div class="ana-pct" style="color:${clr}">${pct2}%</div></div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return `<div class="screen"><div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">Leaderboard</div>
      <div style="color:var(--muted2);font-size:12px;margin-top:2px">Ranked by average % across all quizzes</div>
    </div>
    <button class="btn btn-o btn-sm" id="refreshBtn">&#8635; Refresh</button>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:18px">Skipped quizzes are not counted — only attempted quizzes affect your rank.</div>
  ${lbHTML}
  ${anaHTML}
  <button class="btn btn-o" id="backBtn" style="margin-top:20px">&#8592; Back</button>
</div></div>`;
}

/* =================== EVENT BINDING =================== */
function bind() {
  const $ = id => document.getElementById(id);
  switch(S.screen) {
    case 'home':
      $('nameIn')?.addEventListener('change', e => { S.name=e.target.value; S.err=''; });
      $('labelIn')?.addEventListener('input',  e => { S.quizLabel=e.target.value; });
      $('startBtn')?.addEventListener('click', startQuiz);
      $('lbBtn')?.addEventListener('click', async () => {
        set({screen:'leaderboard',lbLoading:true,leaderboard:[]});
        set({leaderboard:await loadLeaderboard(),lbLoading:false});
      });
      break;
    case 'quiz': {
      const q = QS[S.qi];
      if (q.type==='mcq') document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>pickOpt(parseInt(b.dataset.i))));
      if (q.type==='tf') { $('tfT')?.addEventListener('click',()=>pickTF(true)); $('tfF')?.addEventListener('click',()=>pickTF(false)); }
      $('nextBtn')?.addEventListener('click', next);
      break;
    }
    case 'myresult':
      $('dlBtn')?.addEventListener('click', ()=>downloadReport(S.myResult,null));
      $('copyBtn')?.addEventListener('click', copyCode);
      $('codeVal')?.addEventListener('click', ()=>{ const sel=window.getSelection(); sel.selectAllChildren($('codeVal')); });
      $('cmpBtn')?.addEventListener('click', compare);
      $('skipBtn')?.addEventListener('click', ()=>set({screen:'results',tab:'mine'}));
      $('cmpInput')?.addEventListener('input', e=>{ S.compareCode=e.target.value; S.err=''; });
      break;
    case 'results':
      document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>set({tab:b.dataset.tab})));
      $('dlMineBtn')?.addEventListener('click', ()=>downloadReport(S.myResult,S.oppResult));
      $('dlOppBtn')?.addEventListener('click', ()=>S.oppResult&&downloadReport(S.oppResult,S.myResult));
      $('lbBtn2')?.addEventListener('click', async ()=>{ set({screen:'leaderboard',lbLoading:true,leaderboard:[]}); set({leaderboard:await loadLeaderboard(),lbLoading:false}); });
      $('resetBtn')?.addEventListener('click', reset);
      break;
    case 'leaderboard':
      $('refreshBtn')?.addEventListener('click', async ()=>{ set({lbLoading:true,leaderboard:[]}); set({leaderboard:await loadLeaderboard(),lbLoading:false}); });
      $('backBtn')?.addEventListener('click', ()=>set({screen:S.myResult?'results':'home'}));
      break;
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

draw();
</script>
